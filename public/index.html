<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentinel — Portfolio Compliance & SEO Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%236366f1'/><stop offset='100%25' stop-color='%238b5cf6'/></linearGradient></defs><rect width='32' height='32' rx='8' fill='url(%23g)'/><path d='M16 6l8 4.5v7L16 22l-8-4.5v-7z' fill='none' stroke='white' stroke-width='1.5'/><path d='M16 6v16M8 10.5L24 17.5M24 10.5L8 17.5' fill='none' stroke='white' stroke-width='0.8' opacity='0.5'/></svg>">
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand" onclick="navigate('home')">
        <div class="sidebar-logo">
          <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
            <defs><linearGradient id="logo-g" x1="0" y1="0" x2="32" y2="32"><stop offset="0%" stop-color="#818cf8"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient></defs>
            <path d="M16 3l11 6.5v13L16 29 5 22.5v-13z" stroke="url(#logo-g)" stroke-width="1.8" fill="none"/>
            <circle cx="16" cy="16" r="4" fill="url(#logo-g)" opacity="0.8"/>
          </svg>
        </div>
        <div class="sidebar-title-group">
          <div class="sidebar-title">Sentinel</div>
          <div class="sidebar-subtitle">Compliance Intelligence</div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-label" data-i18n="nav.overview">&#220;bersicht</div>
          <button class="nav-item active" data-page="home" onclick="navigate('home')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span data-i18n="nav.commandCenter">&#220;bersicht</span>
          </button>
          <button class="nav-item" data-page="dashboard" onclick="navigate('dashboard')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
            <span data-i18n="nav.portfolioGrid">Portfolio-Raster</span>
          </button>
        </div>

        <div class="nav-section">
          <div class="nav-section-label" data-i18n="nav.management">Verwaltung</div>
          <button class="nav-item" data-page="companies" onclick="navigate('companies')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 20h20M4 20V8l8-5 8 5v12"/><path d="M9 20v-5h6v5M9 11h.01M15 11h.01"/></svg>
            <span data-i18n="nav.companies">Unternehmen</span>
          </button>
          <button class="nav-item" data-page="scan-all" onclick="scanAll()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
            <span data-i18n="nav.scanAll">Alle scannen</span>
          </button>
        </div>

        <div class="nav-section">
          <div class="nav-section-label" data-i18n="nav.contentTools">Content-Tools</div>
          <button class="nav-item" data-page="youtube" onclick="navigate('youtube')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33A2.78 2.78 0 0 0 3.4 19.1c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.25 29 29 0 0 0-.46-5.43z"/><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"/></svg>
            <span data-i18n="nav.youtube">YouTube SEO</span>
          </button>
          <button class="nav-item" data-page="articles" onclick="navigate('articles')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            <span data-i18n="nav.articles">Artikel-Generator</span>
          </button>
          <button class="nav-item" data-page="outreach" onclick="navigate('outreach')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
            <span data-i18n="nav.outreach">Outreach Bot</span>
          </button>
        </div>

        <div class="nav-section">
          <div class="nav-section-label" data-i18n="nav.analysis">Analyse</div>
          <button class="nav-item" data-page="discrepancies" onclick="navigate('discrepancies')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            <span data-i18n="nav.discrepancies">Abweichungen</span>
            <span class="nav-badge" id="discrepancy-badge" style="display:none">0</span>
          </button>
        </div>

        <div class="nav-section">
          <div class="nav-section-label" data-i18n="nav.system">System</div>
          <button class="nav-item" data-page="settings" onclick="navigate('settings')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span data-i18n="nav.settings">Einstellungen</span>
          </button>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="user-avatar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <div>
            <div class="user-name">Administrator</div>
            <div class="user-role">Portfolio Manager</div>
          </div>
        </div>
        <div class="lang-toggle" onclick="switchLanguage()">
          <span class="lang-flag" id="lang-flag">DE</span>
          <span class="lang-label" id="lang-label">Deutsch</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity:0.5"><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><circle cx="12" cy="12" r="10"/></svg>
        </div>
        <div class="sidebar-version">Sentinel v3.0.0</div>
      </div>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
      <header class="main-header">
        <div class="header-left">
          <button class="mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div>
            <div class="header-title" id="header-title">&#220;bersicht</div>
            <div class="header-breadcrumb" id="header-breadcrumb">Portfolio-&#220;bersicht</div>
          </div>
        </div>
        <div class="header-actions" id="header-actions">
          <button class="btn btn-ghost" onclick="scanAll()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
            <span data-i18n="nav.scanAll">Alle scannen</span>
          </button>
          <button class="btn btn-primary" onclick="showAddCompanyModal()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            <span data-i18n="modal.addCompany">Unternehmen hinzuf&#252;gen</span>
          </button>
        </div>
      </header>

      <div class="main-body" id="main-body">
        <!-- Dynamic content rendered here -->
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="/js/i18n.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
